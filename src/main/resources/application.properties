spring.application.name=mercadez-backend
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mercadez}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Desativa o UserDetailsService padrão do Spring (evita "generated security password")
spring.security.user.name=disabled
spring.security.user.password=disabled

mercadez.jwt.secret=${JWT_SECRET:mercadez-chave-dev-troque-em-producao-abc123}
mercadez.jwt.expiration=86400000

mercadez.cors.origins=${CORS_ORIGINS:https://mercadez-ten.vercel.app,http://localhost:5500,http://127.0.0.1:5500}

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.default-property-inclusion=non_null
